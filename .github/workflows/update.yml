name: Update profile

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Configura o Git globalmente no ambiente antes de rodar os scripts
      - name: Configurar ambiente Git
        run: |
          git config --global user.email "isabellagaspar65@gmail.com"
          git config --global user.name "github-actions[bot]"

      - name: Preencher grafo
        run: python scripts/generate_dates.py

      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
          fps: 40
          no-amend: 'true'

      # Salva o GIF e envia tudo com segurança
      - name: Enviar atualizações e GIF para o repositório
        run: |
          git add game.gif
          # O "|| true" evita que o workflow quebre caso o GIF não mude de tamanho/conteúdo
          git commit -m "chore: update space shooter game.gif" || true
          git push origin main
